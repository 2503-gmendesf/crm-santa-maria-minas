<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CRM Comercial — Rede de Colégios Santa Maria Minas</title>
  <meta name="description" content="Sistema CRM Comercial da Rede de Colégios Santa Maria Minas">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Sora:wght@600;700;800&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages.css">

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

  <style>
    /* Fallback se Google Fonts não carregar */
    body { font-family: 'DM Sans', system-ui, -apple-system, sans-serif; }
  </style>
</head>
<body>

<!-- ── Toast Container ── -->
<div id="toast-container"></div>

<!-- ── Tela de Login ── -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <img src="assets/logo.svg" alt="Logo Santa Maria Minas">
      <h1>Santa Maria Minas</h1>
      <p>Rede de Colégios Santa Maria Minas<br>Sistema Comercial</p>
    </div>

    <form class="login-form" id="form-login">
      <div class="form-group">
        <label class="form-label" for="login-email">E-mail</label>
        <input type="email" class="form-control" id="login-email"
          placeholder="seu@email.com" autocomplete="email" required>
      </div>
      <div class="form-group">
        <label class="form-label" for="login-senha">Senha</label>
        <input type="password" class="form-control" id="login-senha"
          placeholder="••••••" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn btn-primary">Entrar no Sistema</button>
    </form>

  </div>
</div>

<!-- ── App Principal ── -->
<div id="app" style="display:none">

  <!-- Sidebar -->
  <nav id="sidebar">
    <div class="sidebar-header">
      <img class="sidebar-logo-img" src="assets/logo.svg" alt="CSM">
      <div class="sidebar-logo-text">
        <strong>Santa Maria</strong>
        <span>Minas</span>
      </div>
      <button class="sidebar-toggle" onclick="toggleSidebar()" title="Recolher menu">☰</button>
    </div>

    <div class="sidebar-nav">
      <div class="sidebar-nav-item" data-page="dashboard" onclick="navegar('dashboard')">
        <span class="nav-icon">🏠</span>
        <span class="sidebar-label">Dashboard</span>
      </div>
      <div class="sidebar-nav-item" data-page="kanban" onclick="navegar('kanban')">
        <span class="nav-icon">📋</span>
        <span class="sidebar-label">Funil de Vendas</span>
        <span class="nav-badge" id="badge-kanban" style="display:none">0</span>
      </div>
      <div class="sidebar-nav-item" data-page="leads" onclick="navegar('leads')">
        <span class="nav-icon">👥</span>
        <span class="sidebar-label">Lista de Leads</span>
        <span class="nav-badge" id="badge-leads" style="display:none">0</span>
      </div>
      <div class="sidebar-nav-item" onclick="abrirFormLead()">
        <span class="nav-icon">➕</span>
        <span class="sidebar-label">Novo Lead</span>
      </div>
      <div class="sidebar-nav-item" data-page="relatorios" data-master-only onclick="navegar('relatorios')">
        <span class="nav-icon">📊</span>
        <span class="sidebar-label">Relatórios</span>
      </div>
      <div class="sidebar-nav-item" data-page="configuracoes" data-master-only onclick="navegar('configuracoes')">
        <span class="nav-icon">⚙️</span>
        <span class="sidebar-label">Configurações</span>
      </div>
    </div>

    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="avatar avatar-sm" id="sidebar-user-avatar">U</div>
        <div class="sidebar-user-name">
          <strong id="sidebar-user-nome">Usuário</strong>
          <span id="sidebar-user-cargo">Cargo</span>
        </div>
        <button class="sidebar-logout" onclick="fazerLogout()" title="Sair">⏻</button>
      </div>
    </div>
  </nav>

  <!-- Conteúdo principal -->
  <main id="main-content">

    <!-- Dashboard -->
    <div class="page" id="page-dashboard"></div>

    <!-- Kanban -->
    <div class="page" id="page-kanban" style="flex-direction:column"></div>

    <!-- Lista de Leads -->
    <div class="page" id="page-leads" style="flex-direction:column"></div>

    <!-- Relatórios -->
    <div class="page" id="page-relatorios" style="flex-direction:column"></div>

    <!-- Configurações (Admin) -->
    <div class="page" id="page-configuracoes" style="flex-direction:column"></div>

  </main>
</div>

<!-- Scripts (ordem importa: supabase → cliente → data → auth → módulos → app) -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-client.js"></script>
<script src="js/data.js"></script>
<script src="js/auth.js"></script>
<script src="js/dashboard.js"></script>
<script src="js/kanban.js"></script>
<script src="js/leads.js"></script>
<script src="js/reports.js"></script>
<script src="js/admin.js"></script>
<script src="js/app.js"></script>

</body>
</html>
